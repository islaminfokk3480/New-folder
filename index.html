<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Architecture</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Cinematic Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Background Video -->
    <div class="video-container">
        <div class="video-vignette"></div>
        <video autoplay muted loop playsinline class="bg-video">
            <source src="video_preview_h264 (1).mp4" type="video/mp4">
        </video>
    </div>

    <!-- Overlay content wrapper -->
    <div class="content-wrapper">

        <!-- Header -->
        <header>
            <div class="logo hover-target">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 2 17 12 22 22 17 22 7 12 2"></polygon>
                    <line x1="12" y1="22" x2="12" y2="12"></line>
                    <line x1="22" y1="7" x2="12" y2="12"></line>
                    <line x1="2" y1="7" x2="12" y2="12"></line>
                </svg>
                <span>Choco</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="hover-target" data-text="Home">Home</a>
                <a href="#" class="hover-target" data-text="Shop">Shop</a>
                <a href="#" class="hover-target" data-text="About us">About us</a>
                <a href="#" class="hover-target" data-text="Contact">Contact</a>
            </nav>
        </header>

        <!-- Main Hero text -->
        <main class="hero-text-container">
            <div class="text-left">
                <h1 class="split-line"><span class="reveal-text">Chocolate</span></h1>
                <h1 class="split-line"><span class="reveal-text serif-italic">makes</span></h1>
            </div>
            <div class="text-right">
                <h1 class="split-line"><span class="reveal-text">Everything</span></h1>
                <h1 class="split-line"><span class="reveal-text serif-italic">better.</span></h1>
            </div>
        </main>

        <!-- Scroll indicators -->
        <div class="scroll-wrapper wrap-left">
            <div class="scroll-line"></div>
            <span class="scroll-indicator">SCROLL DOWN</span>
        </div>
        <div class="scroll-wrapper wrap-right">
            <span class="scroll-indicator">SCROLL DOWN</span>
            <div class="scroll-line"></div>
        </div>

        <!-- Footer elements -->
        <footer>
            <div class="socials">
                <a href="#" class="hover-target"><i class="fas fa-basketball-ball"></i></a>
                <a href="#" class="hover-target"><i class="fa-brands fa-behance"></i></a>
                <a href="#" class="hover-target"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="hover-target"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
            <div class="footer-right hover-target">
                <span>Contact us <i class="fa-solid fa-arrow-right-long" style="margin-left: 8px;"></i></span>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
